<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOVA — Finance Command</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f131f; --navy-light: #1a1f2e; --accent: #c0392b; --canvas: #f7f5f0; 
      --surface: #ffffff; --border: #e4e1db; --text: #1a1f2e; --text-dim: #5a5750;
      --green: #166534; --green-bg: #dcfce7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--canvas); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    /* ==================== LOGIN ==================== */
    .login-overlay { position: fixed; inset: 0; background: var(--navy); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--surface); padding: 48px; border-radius: 20px; text-align: center; width: 100%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .login-logo { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 8px; }
    .pin-input { width: 100%; height: 60px; text-align: center; font-size: 28px; letter-spacing: 12px; margin: 24px 0; border: 2px solid var(--border); border-radius: 12px; outline: none; transition: 0.2s; }
    .pin-input:focus { border-color: var(--navy); }

    /* ==================== SIDEBAR ==================== */
    .sidebar { width: 280px; background: var(--navy); color: #fff; display: flex; flex-direction: column; padding: 32px 0; border-right: 1px solid rgba(255,255,255,0.05);}
    .sidebar-brand { padding: 0 32px 40px; }
    .nav-item { padding: 14px 32px; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-item.active { color: #fff; background: rgba(255,255,255,0.1); border-right: 4px solid var(--accent); }
    .nav-logout { margin-top: 10px; color: rgba(255,255,255,0.3); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; font-size: 12px; }
    .nav-logout:hover { color: #ff7675; }

    /* ==================== MAIN AREA ==================== */
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-header { background: var(--surface); padding: 24px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .view-content { flex: 1; padding: 40px; overflow-y: auto; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); padding: 24px; border-radius: 16px; border: 1px solid var(--border); }
    .stat-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; }

    /* ==================== FILTER BAR ==================== */
    .filter-bar { background: var(--surface); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 24px; display: flex; gap: 16px; align-items: center; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
    .filter-input { background: #f8fafc; border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; font-family: inherit; outline: none;}
    .search-input { flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); font-size: 13px;}

    /* ==================== DATA CARDS ==================== */
    .data-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
    .data-card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
    
    .brand-tag { font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; margin-bottom: 12px; display: inline-block; letter-spacing: 0.5px; }
    .tag-lava { background: #fee2e2; color: #991b1b; }
    .tag-bianca { background: #e0e7ff; color: #3730a3; }
    .tag-holybelly { background: #fef3c7; color: #92400e; }
    .tag-lova { background: #f3f4f6; color: #374151; }

    .inv-name { font-size: 22px; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
    .inv-note { font-size: 14px; color: var(--text-dim); background: #f8fafc; padding: 12px 16px; border-radius: 10px; border-left: 3px solid var(--border); margin: 12px 0; font-style: italic; }
    .inv-meta { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
    .inv-meta strong { color: var(--navy); font-weight: 700; }
    
    /* ==================== ACTION ZONE ==================== */
    .action-container { text-align: right; min-width: 340px; }
    .inv-amount { font-size: 38px; font-weight: 900; color: var(--green); margin-bottom: 20px; letter-spacing: -1px; }

    .custom-upload { position: relative; display: inline-flex; align-items: center; margin-right: 12px; }
    .btn-file-proxy { background: #f1f3f4; color: var(--text-dim); padding: 14px 20px; border-radius: 12px; font-weight: 700; font-size: 12px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
    .btn-file-proxy:hover { background: #e8eaed; }
    .btn-file-proxy.selected { background: var(--green-bg); color: var(--green); border-color: var(--green); }
    .real-file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .btn-process { background: var(--navy); color: #fff; padding: 14px 32px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; font-size: 14px; transition: 0.2s; box-shadow: 0 4px 10px rgba(15,19,31,0.2); }
    .btn-process:hover { background: var(--navy-light); transform: scale(1.02); }
    
    .btn-view-slip { background: var(--green-bg); color: var(--green); text-decoration: none; padding: 14px 28px; border-radius: 12px; font-weight: 800; font-size: 14px; display: inline-block; transition: 0.2s; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="login-overlay" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">LOVA</div>
      <p style="font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">Finance Manager Portal</p>
      <input type="password" id="adminPin" class="pin-input" placeholder="PIN" onkeydown="if(event.key==='Enter') login()">
      <button class="btn-process" style="width:100%" onclick="login()" id="loginBtn">Authorize Session</button>
      <div id="loginError" style="color:var(--accent); margin-top:16px; font-size:12px; font-weight:700;"></div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1 style="font-family:'Playfair Display'; font-size:24px; letter-spacing:1px;">LOVA</h1>
      <p style="font-size:10px; opacity:0.5; letter-spacing:2px; margin-top:4px;">FINANCE HUB</p>
    </div>
    <div class="nav-item active" onclick="switchView('pipeline')" id="nav-pipeline">Payment Pending POP</div>
    <div class="nav-item" onclick="switchView('history')" id="nav-history">Payment Vault</div>
    
    <div style="margin-top:auto; padding:32px;">
      <button onclick="fetchData()" style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#fff; border-radius:10px; cursor:pointer; font-size:11px; margin-bottom:10px;">↻ Sync Data</button>
      <div class="nav-item nav-logout" onclick="logout()">Logout Portal</div>
    </div>
  </aside>

  <main class="main-area">
    <header class="top-header">
      <h2 id="viewTitle" style="font-size: 22px; font-weight:800;">Payment Pending POP</h2>
      <div style="font-size:12px; font-weight:700; color:var(--text-dim);">Authorized Account: <span style="color:var(--green);">Manager</span></div>
    </header>

    <div class="view-content">
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Active Queue</div>
          <div class="stat-value" id="stat-pending-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Amount (THB)</div>
          <div class="stat-value" id="stat-total-amount">0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Vault History</div>
          <div class="stat-value" id="stat-vault-count">0</div>
        </div>
      </div>

      <div class="filter-bar">
        <div class="filter-group" style="flex:1">
          <div class="filter-label">Search Context</div>
          <input type="text" class="search-input" id="search" placeholder="Supplier or ID..." oninput="render()">
        </div>
        <div class="filter-group">
          <div class="filter-label">Brand</div>
          <select id="filter-brand" class="filter-input" onchange="render()">
            <option value="ALL">All Brands</option>
            <option value="LAVA">LAVA</option>
            <option value="Bianca Holdings">Bianca</option>
            <option value="HolyBelly">HolyBelly</option>
            <option value="Lova">Lova</option>
          </select>
        </div>
        <div class="filter-group">
          <div class="filter-label">From Date</div>
          <input type="date" id="filter-from" class="filter-input" onchange="render()">
        </div>
        <div class="filter-group">
          <div class="filter-label">To Date</div>
          <input type="date" id="filter-to" class="filter-input" onchange="render()">
        </div>
      </div>

      <div id="loading" style="text-align:center; padding:120px; color:var(--text-dim); font-weight:700; letter-spacing:1px;">SYNCHRONIZING FINANCIAL PIPELINE...</div>
      <div id="list"></div>

    </div>
  </main>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyEUJYIu9_O6E50KzKzdEY4EG2VLo4y0Yj8igGRZVMI_zEapqn5w758gdt_nG5tluEdHA/exec';
    let pin = '';
    let currentView = 'pipeline';
    let cache = { pending: [], history: [] };

    async function login() {
      const input = document.getElementById('adminPin');
      const btn = document.getElementById('loginBtn');
      if (!input.value) return;
      btn.disabled = true; btn.innerText = 'Authenticating...';
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'verifyAdminLogin', pincode: input.value }) });
        const data = await res.json();
        if (data.status === 'success') {
          pin = input.value;
          document.getElementById('loginScreen').style.display = 'none';
          fetchData();
        } else {
          document.getElementById('loginError').innerText = data.message;
          btn.disabled = false; btn.innerText = 'Authorize Session';
        }
      } catch (e) { btn.disabled = false; }
    }

    function logout() {
      pin = '';
      document.getElementById('adminPin').value = '';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginError').innerText = '';
      document.getElementById('loginBtn').disabled = false;
      document.getElementById('loginBtn').innerText = 'Authorize Session';
    }

    async function fetchData() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('list').innerHTML = '';
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getDashboardData', pincode: pin }) });
        cache = await res.json();
        document.getElementById('loading').classList.add('hidden');
        render();
      } catch (e) { console.error(e); }
    }

    function switchView(view) {
      currentView = view;
      document.getElementById('nav-pipeline').classList.toggle('active', view === 'pipeline');
      document.getElementById('nav-history').classList.toggle('active', view === 'history');
      document.getElementById('viewTitle').innerText = view === 'pipeline' ? 'Payment Pending POP' : 'Payment Vault';
      render();
    }

    function updateLabel(idx) {
      const input = document.getElementById(`file-${idx}`);
      const proxy = document.getElementById(`proxy-${idx}`);
      proxy.innerText = input.files.length ? input.files[0].name : "Attach Slip";
      proxy.classList.toggle('selected', input.files.length > 0);
    }

    function render() {
      const container = document.getElementById('list');
      const query = document.getElementById('search').value.toLowerCase();
      const brandFilter = document.getElementById('filter-brand').value;
      const fromDate = document.getElementById('filter-from').value;
      const toDate = document.getElementById('filter-to').value;

      const items = currentView === 'pipeline' ? cache.pending : cache.history;
      
      const filtered = items.filter(i => {
        const matchesQuery = i.supplier.toLowerCase().includes(query) || i.id.toLowerCase().includes(query);
        const matchesBrand = brandFilter === "ALL" || i.sheetName === brandFilter;
        const matchesDate = (!fromDate || i.isoDate >= fromDate) && (!toDate || i.isoDate <= toDate);
        return matchesQuery && matchesBrand && matchesDate;
      });

      document.getElementById('stat-pending-count').innerText = cache.pending.length;
      document.getElementById('stat-vault-count').innerText = cache.history.length;
      const sum = filtered.reduce((acc, item) => acc + parseFloat(item.amount || 0), 0);
      document.getElementById('stat-total-amount').innerText = sum.toLocaleString('en-US', {minimumFractionDigits: 2});

      container.innerHTML = filtered.map((item, idx) => `
        <div class="data-card">
          <div style="flex:1; padding-right:40px;">
            <span class="brand-tag tag-${item.sheetName.split(' ')[0].toLowerCase()}">${item.sheetName}</span>
            <div class="inv-name">${item.supplier}</div>
            <div class="inv-meta">
              ID: <strong>${item.id}</strong> • Requester: <strong>${item.requester}</strong><br>
              Submission Date: <strong>${item.date}</strong>
            </div>
            ${item.note ? `<div class="inv-note">Note: ${item.note}</div>` : ''}
          </div>
          <div class="action-container">
            <div class="inv-amount">${parseFloat(item.amount).toLocaleString('en-US', {minimumFractionDigits: 2})} <span style="font-size:16px; vertical-align:middle; opacity:0.6;">THB</span></div>
            <div>
              ${currentView === 'pipeline' ? 
                `<div class="custom-upload">
                  <div class="btn-file-proxy" id="proxy-${idx}">Attach Slip</div>
                  <input type="file" class="real-file-input" id="file-${idx}" onchange="updateLabel(${idx})" accept="image/*,application/pdf">
                </div>
                <button class="btn-process" id="btn-${idx}" onclick="processPayment(${idx})">Process POP</button>` :
                `<a href="${item.popUrl}" target="_blank" class="btn-view-slip">View Proof of Payment</a>`
              }
            </div>
          </div>
        </div>
      `).join('');
    }

    async function processPayment(idx) {
      const fileInput = document.getElementById(`file-${idx}`);
      const btn = document.getElementById(`btn-${idx}`);
      if (!fileInput.files.length) return alert("Please attach the Proof of Payment slip first.");

      btn.disabled = true; btn.innerText = "Processing...";
      const reader = new FileReader();
      reader.onload = async function() {
        const payload = { action: 'submitPOP', pincode: pin, invoice: cache.pending[idx], fileName: fileInput.files[0].name, fileBase64: reader.result.split(',')[1] };
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === 'success') fetchData();
        else { alert("Error: " + result.message); btn.disabled = false; btn.innerText = "Process POP"; }
      };
      reader.readAsDataURL(fileInput.files[0]);
    }
  </script>
</body>
</html>
