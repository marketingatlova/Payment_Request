<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOVA — Finance Command</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f131f; --navy-light: #1a1f2e; --accent: #c0392b; --canvas: #f7f5f0; 
      --surface: #ffffff; --border: #e4e1db; --text: #1a1f2e; --text-dim: #5a5750;
      --green: #166534; --green-bg: #dcfce7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--canvas); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    /* ==================== LOGIN ==================== */
    .login-overlay { position: fixed; inset: 0; background: var(--navy); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--surface); padding: 48px; border-radius: 20px; text-align: center; width: 100%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .login-logo { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 8px; }
    .pin-input { width: 100%; height: 60px; text-align: center; font-size: 28px; letter-spacing: 12px; margin: 24px 0; border: 2px solid var(--border); border-radius: 12px; outline: none; transition: 0.2s; }
    .pin-input:focus { border-color: var(--navy); }

    /* ==================== SIDEBAR ==================== */
    .sidebar { width: 280px; background: var(--navy); color: #fff; display: flex; flex-direction: column; padding: 32px 0; }
    .sidebar-brand { padding: 0 32px 40px; }
    .nav-item { padding: 14px 32px; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-item.active { color: #fff; background: rgba(255,255,255,0.1); border-right: 4px solid var(--accent); }
    
    /* ==================== MAIN CONTENT ==================== */
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-header { background: var(--surface); padding: 24px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .view-content { flex: 1; padding: 40px; overflow-y: auto; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); padding: 24px; border-radius: 16px; border: 1px solid var(--border); }
    .stat-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; }

    /* ==================== CARDS ==================== */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .search-box { background: #fff; border: 1px solid var(--border); padding: 10px 16px; border-radius: 8px; width: 300px; font-size: 13px; }
    
    .data-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
    .data-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.04); }
    
    .brand-tag { font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; margin-bottom: 8px; display: inline-block; }
    .tag-lava { background: #fee2e2; color: #991b1b; }
    .tag-bianca { background: #e0e7ff; color: #3730a3; }
    .tag-holybelly { background: #fef3c7; color: #92400e; }
    .tag-lova { background: #f3f4f6; color: #374151; }

    .inv-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .inv-meta { font-size: 12px; color: var(--text-dim); }
    .inv-amount { font-size: 18px; font-weight: 800; color: var(--green); text-align: right; }

    .btn-action { background: var(--navy); color: #fff; padding: 12px 24px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; font-size: 13px; transition: 0.2s; }
    .btn-action:hover { background: var(--navy-light); }
    .btn-pop { background: var(--green-bg); color: var(--green); text-decoration: none; padding: 8px 12px; border-radius: 6px; font-weight: 700; font-size: 12px; }

    /* UTILS */
    .hidden { display: none !important; }
    .btn-refresh { background: none; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; }
  </style>
</head>
<body>

  <div class="login-overlay" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">LOVA</div>
      <p style="font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">Finance Command Center</p>
      <input type="password" id="adminPin" class="pin-input" placeholder="PIN" onkeydown="if(event.key==='Enter') login()">
      <button class="btn-action" style="width:100%" onclick="login()" id="loginBtn">Authorize Access</button>
      <div id="loginError" style="color:red; margin-top:16px; font-size:12px; font-weight:600;"></div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1 style="font-family:'Playfair Display'; font-size:24px;">LOVA</h1>
      <p style="font-size:10px; opacity:0.5; letter-spacing:2px; margin-top:4px;">ADMIN PORTAL</p>
    </div>
    <div class="nav-item active" onclick="switchView('pipeline')" id="nav-pipeline">Active Pipeline</div>
    <div class="nav-item" onclick="switchView('history')" id="nav-history">Payment Vault</div>
    <div style="margin-top:auto; padding:32px;">
      <button class="btn-refresh" style="color:#fff; border-color:rgba(255,255,255,0.2); width:100%" onclick="fetchData()">↻ Sync Data</button>
    </div>
  </aside>

  <main class="main-area">
    <header class="top-header">
      <h2 id="viewTitle" style="font-size: 20px; font-weight:700;">Active Pipeline</h2>
      <div id="userBadge" style="font-size:12px; font-weight:700; background:var(--canvas); padding:8px 16px; border-radius:20px;">Manager Mode</div>
    </header>

    <div class="view-content">
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Pending Total</div>
          <div class="stat-value" id="stat-pending-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Volume (THB)</div>
          <div class="stat-value" id="stat-total-amount">0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Vault Records</div>
          <div class="stat-value" id="stat-vault-count">0</div>
        </div>
      </div>

      <div class="section-header">
        <h3 style="font-size:14px; text-transform:uppercase; letter-spacing:1px;" id="listLabel">Queue</h3>
        <input type="text" class="search-box" id="search" placeholder="Search supplier or ID..." oninput="render()">
      </div>

      <div id="loading" style="text-align:center; padding:100px; color:var(--text-dim);">Syncing with Master Sheets...</div>
      <div id="list"></div>

    </div>
  </main>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyEUJYIu9_O6E50KzKzdEY4EG2VLo4y0Yj8igGRZVMI_zEapqn5w758gdt_nG5tluEdHA/exec';
    let pin = '';
    let currentView = 'pipeline';
    let rawData = { pending: [], history: [] };

    async function login() {
      const input = document.getElementById('adminPin');
      const btn = document.getElementById('loginBtn');
      if (!input.value) return;
      
      btn.disabled = true; btn.innerText = 'Verifying...';
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'verifyAdminLogin', pincode: input.value }) });
        const data = await res.json();
        if (data.status === 'success') {
          pin = input.value;
          document.getElementById('loginScreen').style.display = 'none';
          fetchData();
        } else {
          document.getElementById('loginError').innerText = data.message;
          btn.disabled = false; btn.innerText = 'Authorize Access';
        }
      } catch (e) { btn.disabled = false; }
    }

    async function fetchData() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('list').innerHTML = '';
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getDashboardData', pincode: pin }) });
        rawData = await res.json();
        document.getElementById('loading').classList.add('hidden');
        updateStats();
        render();
      } catch (e) { console.error(e); }
    }

    function updateStats() {
      document.getElementById('stat-pending-count').innerText = rawData.pending.length;
      document.getElementById('stat-vault-count').innerText = rawData.history.length;
      const total = rawData.pending.reduce((sum, item) => sum + parseFloat(item.amount || 0), 0);
      document.getElementById('stat-total-amount').innerText = total.toLocaleString('en-US', {minimumFractionDigits: 2});
    }

    function switchView(view) {
      currentView = view;
      document.getElementById('nav-pipeline').classList.toggle('active', view === 'pipeline');
      document.getElementById('nav-history').classList.toggle('active', view === 'history');
      document.getElementById('viewTitle').innerText = view === 'pipeline' ? 'Active Pipeline' : 'Payment Vault';
      document.getElementById('listLabel').innerText = view === 'pipeline' ? 'Queue' : 'Historical Data';
      render();
    }

    function render() {
      const container = document.getElementById('list');
      const search = document.getElementById('search').value.toLowerCase();
      const items = currentView === 'pipeline' ? rawData.pending : rawData.history;
      
      const filtered = items.filter(i => i.supplier.toLowerCase().includes(search) || i.id.toLowerCase().includes(search));
      
      container.innerHTML = filtered.map((item, idx) => `
        <div class="data-card">
          <div>
            <span class="brand-tag tag-${item.sheetName.split(' ')[0].toLowerCase()}">${item.sheetName}</span>
            <div class="inv-name">${item.supplier}</div>
            <div class="inv-meta">ID: <strong>${item.id}</strong> • Requester: ${item.requester}</div>
          </div>
          <div style="text-align:right">
            <div class="inv-amount">${parseFloat(item.amount).toLocaleString()} THB</div>
            <div style="margin-top:12px;">
              ${currentView === 'pipeline' ? 
                `<input type="file" id="file-${idx}" style="font-size:11px; margin-right:10px;">
                 <button class="btn-action" id="btn-${idx}" onclick="process(${idx})">Process POP</button>` :
                `<a href="${item.popUrl}" target="_blank" class="btn-pop">View Transfer Slip</a>`
              }
            </div>
            <div id="status-${idx}" style="font-size:11px; font-weight:700; color:var(--green); margin-top:8px; display:none;"></div>
          </div>
        </div>
      `).join('');
    }

    async function process(idx) {
      const file = document.getElementById(`file-${idx}`).files[0];
      const btn = document.getElementById(`btn-${idx}`);
      const status = document.getElementById(`status-${idx}`);
      if (!file) return alert("Select a file first.");

      btn.disabled = true; btn.innerText = "Processing...";
      const reader = new FileReader();
      reader.onload = async function() {
        const payload = { action: 'submitPOP', pincode: pin, invoice: rawData.pending[idx], fileName: file.name, fileBase64: reader.result.split(',')[1] };
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === 'success') {
          status.style.display = "block"; status.innerText = "✅ Paid & Emailed";
          btn.style.display = "none";
          setTimeout(fetchData, 1500);
        }
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
