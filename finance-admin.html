<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOVA — Finance Command</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f131f; --navy-light: #1a1f2e; --accent: #c0392b; --canvas: #f7f5f0; 
      --surface: #ffffff; --border: #e4e1db; --text: #1a1f2e; --text-dim: #5a5750;
      --green: #166534; --green-bg: #dcfce7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--canvas); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    /* ==================== LOGIN ==================== */
    .login-overlay { position: fixed; inset: 0; background: var(--navy); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--surface); padding: 48px; border-radius: 20px; text-align: center; width: 100%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .login-logo { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 8px; }
    .pin-input { width: 100%; height: 60px; text-align: center; font-size: 28px; letter-spacing: 12px; margin: 24px 0; border: 2px solid var(--border); border-radius: 12px; outline: none; transition: 0.2s; }
    .pin-input:focus { border-color: var(--navy); }

    /* ==================== SIDEBAR ==================== */
    .sidebar { width: 280px; background: var(--navy); color: #fff; display: flex; flex-direction: column; padding: 32px 0; border-right: 1px solid rgba(255,255,255,0.05);}
    .sidebar-brand { padding: 0 32px 40px; }
    .nav-item { padding: 14px 32px; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-item.active { color: #fff; background: rgba(255,255,255,0.1); border-right: 4px solid var(--accent); }
    
    /* ==================== MAIN AREA ==================== */
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-header { background: var(--surface); padding: 24px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .view-content { flex: 1; padding: 40px; overflow-y: auto; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); padding: 24px; border-radius: 16px; border: 1px solid var(--border); }
    .stat-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; }

    /* ==================== SEARCH & LIST ==================== */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .search-box { background: #fff; border: 1px solid var(--border); padding: 12px 16px; border-radius: 10px; width: 320px; font-size: 13px; font-family: inherit; }
    
    .data-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
    .data-card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
    
    .brand-tag { font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; margin-bottom: 12px; display: inline-block; letter-spacing: 0.5px; }
    .tag-lava { background: #fee2e2; color: #991b1b; }
    .tag-bianca { background: #e0e7ff; color: #3730a3; }
    .tag-holybelly { background: #fef3c7; color: #92400e; }
    .tag-lova { background: #f3f4f6; color: #374151; }

    .inv-name { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
    .inv-meta { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
    .inv-meta strong { color: var(--navy); }
    
    /* ==================== ACTION BOX ==================== */
    .action-container { text-align: right; min-width: 280px; }
    .inv-amount { font-size: 26px; font-weight: 800; color: var(--green); margin-bottom: 16px; }
    
    /* CUSTOM BRANDED FILE PICKER */
    .custom-upload { position: relative; display: inline-flex; align-items: center; margin-right: 12px; }
    .btn-file-proxy { background: #f1f3f4; color: var(--text-dim); padding: 12px 16px; border-radius: 10px; font-weight: 700; font-size: 12px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; white-space: nowrap; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
    .btn-file-proxy:hover { background: #e8eaed; }
    .btn-file-proxy.selected { background: var(--green-bg); color: var(--green); border-color: var(--green); }
    .real-file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .btn-process { background: var(--navy); color: #fff; padding: 14px 28px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; font-size: 14px; transition: 0.2s; box-shadow: 0 4px 10px rgba(15,19,31,0.2); }
    .btn-process:hover { background: var(--navy-light); transform: scale(1.02); }
    .btn-process:active { transform: scale(0.98); }
    .btn-process:disabled { opacity: 0.5; cursor: wait; }
    
    .btn-view-slip { background: var(--green-bg); color: var(--green); text-decoration: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; font-size: 13px; display: inline-block; transition: 0.2s; }
    .btn-view-slip:hover { background: #d1fae5; }

    /* UTILS */
    .hidden { display: none !important; }
    .btn-sync { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 12px; width: 100%; transition: 0.2s; }
    .btn-sync:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

  <div class="login-overlay" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">LOVA</div>
      <p style="font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">Admin Dashboard Access</p>
      <input type="password" id="adminPin" class="pin-input" placeholder="PIN" onkeydown="if(event.key==='Enter') login()">
      <button class="btn-process" style="width:100%" onclick="login()" id="loginBtn">Authenticate Manager</button>
      <div id="loginError" style="color:var(--accent); margin-top:16px; font-size:12px; font-weight:700;"></div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1 style="font-family:'Playfair Display'; font-size:24px; letter-spacing:1px;">LOVA</h1>
      <p style="font-size:10px; opacity:0.5; letter-spacing:2px; margin-top:4px;">FINANCE HUB</p>
    </div>
    <div class="nav-item active" onclick="switchView('pipeline')" id="nav-pipeline">Payment Pending POP</div>
    <div class="nav-item" onclick="switchView('history')" id="nav-history">Payment Vault</div>
    <div style="margin-top:auto; padding:32px;">
      <button class="btn-sync" onclick="fetchData()">↻ Refresh Database</button>
    </div>
  </aside>

  <main class="main-area">
    <header class="top-header">
      <h2 id="viewTitle" style="font-size: 22px; font-weight:800;">Payment Pending POP</h2>
      <div style="font-size:12px; font-weight:700; color:var(--text-dim);">Status: <span style="color:var(--green);">Authorized Manager</span></div>
    </header>

    <div class="view-content">
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Requests Pending</div>
          <div class="stat-value" id="stat-pending-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending Value (THB)</div>
          <div class="stat-value" id="stat-total-amount">0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Vaulted</div>
          <div class="stat-value" id="stat-vault-count">0</div>
        </div>
      </div>

      <div class="section-header">
        <h3 style="font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim);" id="listLabel">Current Queue</h3>
        <input type="text" class="search-box" id="search" placeholder="Search Supplier, ID, or Date..." oninput="render()">
      </div>

      <div id="loading" style="text-align:center; padding:120px; color:var(--text-dim); font-weight:600; letter-spacing:1px;">SYNCING SECURE PIPELINE...</div>
      <div id="list"></div>

    </div>
  </main>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyEUJYIu9_O6E50KzKzdEY4EG2VLo4y0Yj8igGRZVMI_zEapqn5w758gdt_nG5tluEdHA/exec';
    let sessionPin = '';
    let currentView = 'pipeline';
    let dataCache = { pending: [], history: [] };

    async function login() {
      const input = document.getElementById('adminPin');
      const btn = document.getElementById('loginBtn');
      if (!input.value) return;
      btn.disabled = true; btn.innerText = 'Verifying Credentials...';
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'verifyAdminLogin', pincode: input.value }) });
        const data = await res.json();
        if (data.status === 'success') {
          sessionPin = input.value;
          document.getElementById('loginScreen').style.display = 'none';
          fetchData();
        } else {
          document.getElementById('loginError').innerText = data.message;
          btn.disabled = false; btn.innerText = 'Authenticate Manager';
        }
      } catch (e) { btn.disabled = false; }
    }

    async function fetchData() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('list').innerHTML = '';
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getDashboardData', pincode: sessionPin }) });
        dataCache = await res.json();
        document.getElementById('loading').classList.add('hidden');
        updateHeaderStats();
        render();
      } catch (e) { console.error(e); }
    }

    function updateHeaderStats() {
      document.getElementById('stat-pending-count').innerText = dataCache.pending.length;
      document.getElementById('stat-vault-count').innerText = dataCache.history.length;
      const sum = dataCache.pending.reduce((acc, item) => acc + parseFloat(item.amount || 0), 0);
      document.getElementById('stat-total-amount').innerText = sum.toLocaleString('en-US', {minimumFractionDigits: 2});
    }

    function switchView(view) {
      currentView = view;
      document.getElementById('nav-pipeline').classList.toggle('active', view === 'pipeline');
      document.getElementById('nav-history').classList.toggle('active', view === 'history');
      document.getElementById('viewTitle').innerText = view === 'pipeline' ? 'Payment Pending POP' : 'Payment Vault';
      document.getElementById('listLabel').innerText = view === 'pipeline' ? 'Current Queue' : 'Historical Data (Temporal Backtrack)';
      render();
    }

    function updateFileLabel(idx) {
      const input = document.getElementById(`file-${idx}`);
      const proxy = document.getElementById(`proxy-${idx}`);
      if (input.files.length > 0) {
        proxy.innerText = input.files[0].name;
        proxy.classList.add('selected');
      } else {
        proxy.innerText = "Attach Slip";
        proxy.classList.remove('selected');
      }
    }

    function render() {
      const container = document.getElementById('list');
      const query = document.getElementById('search').value.toLowerCase();
      const items = currentView === 'pipeline' ? dataCache.pending : dataCache.history;
      
      const filtered = items.filter(i => 
        i.supplier.toLowerCase().includes(query) || 
        i.id.toLowerCase().includes(query) ||
        (i.date && i.date.toLowerCase().includes(query))
      );
      
      container.innerHTML = filtered.map((item, idx) => `
        <div class="data-card">
          <div>
            <span class="brand-tag tag-${item.sheetName.split(' ')[0].toLowerCase()}">${item.sheetName}</span>
            <div class="inv-name">${item.supplier}</div>
            <div class="inv-meta">
              ID: <strong>${item.id}</strong><br>
              Date: <strong>${item.date}</strong> • Requested By: <strong>${item.requester}</strong>
            </div>
          </div>
          <div class="action-container">
            <div class="inv-amount">${parseFloat(item.amount).toLocaleString('en-US', {minimumFractionDigits: 2})} THB</div>
            <div>
              ${currentView === 'pipeline' ? 
                `<div class="custom-upload">
                   <div class="btn-file-proxy" id="proxy-${idx}">Attach Slip</div>
                   <input type="file" class="real-file-input" id="file-${idx}" onchange="updateFileLabel(${idx})" accept="image/*,application/pdf">
                 </div>
                 <button class="btn-process" id="btn-${idx}" onclick="processPayment(${idx})">Process POP</button>` :
                `<a href="${item.popUrl}" target="_blank" class="btn-view-slip">View Proof of Payment</a>`
              }
            </div>
            <div id="status-${idx}" style="font-size:12px; font-weight:800; color:var(--green); margin-top:10px; display:none;"></div>
          </div>
        </div>
      `).join('');
    }

    async function processPayment(idx) {
      const fileInput = document.getElementById(`file-${idx}`);
      const btn = document.getElementById(`btn-${idx}`);
      const status = document.getElementById(`status-${idx}`);
      if (fileInput.files.length === 0) return alert("Please attach the Proof of Payment slip first.");

      btn.disabled = true; btn.innerText = "Encrypting & Notifying...";
      const reader = new FileReader();
      reader.onload = async function() {
        const payload = { action: 'submitPOP', pincode: sessionPin, invoice: dataCache.pending[idx], fileName: fileInput.files[0].name, fileBase64: reader.result.split(',')[1] };
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === 'success') {
          status.style.display = "block"; status.innerText = "✅ PAID & EMAILED";
          btn.style.display = "none";
          document.getElementById(`proxy-${idx}`).style.display = "none";
          setTimeout(fetchData, 1500);
        } else {
          alert("Error: " + result.message);
          btn.disabled = false; btn.innerText = "Process POP";
        }
      };
      reader.readAsDataURL(fileInput.files[0]);
    }
  </script>
</body>
</html>
